<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FT RAMOT SESI 19.00 — Turnamen Free Fire</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(ellipse at 20% 30%, #0a0f2a, #03050b);
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            color: #edf2ff;
            -webkit-font-smoothing: antialiased;
        }
        .premium-container {
            max-width: 1400px;
            margin: 0 auto;
            overflow: visible;
        }
        .hero-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding: 1rem 1.5rem;
            background: rgba(15, 25, 45, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .title-area h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #FFFFFF;
            text-shadow: 0 0 8px #7EE7FF, 0 0 2px #A855F7;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .title-area h1 i {
            color: #7EE7FF;
            font-size: 1.8rem;
            text-shadow: none;
        }
        .sub {
            font-size: 0.8rem;
            color: #a0b3d9;
            margin-top: 8px;
            display: flex;
            gap: 20px;
        }
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin: 1.8rem 0 1.5rem 0;
            gap: 15px;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn-premium {
            background: rgba(20, 30, 55, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(80, 160, 255, 0.5);
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #eef2ff;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-premium i { font-size: 0.9rem; }
        .btn-primary {
            background: linear-gradient(95deg, #0f2b3d, #1b4b6e);
            border-color: #2dd4bf;
            box-shadow: 0 2px 8px rgba(45,212,191,0.2);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            background: linear-gradient(95deg, #1a4a6e, #2c6e96);
            border-color: #5eead4;
        }
        .btn-danger {
            border-color: #f87171;
            color: #ffe0e0;
        }
        .btn-danger:hover { background: #991b1b80; }
        .btn-success {
            border-color: #10b981;
            color: #a7f3d0;
        }
        .btn-success:hover { background: #065f46b3; }
        .table-wrapper {
            border-radius: 2rem;
            background: rgba(8, 14, 26, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(45, 212, 191, 0.3);
            overflow-x: auto; /* untuk scroll di browser, tapi saat screenshot diubah sementara */
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.6);
            margin-bottom: 2rem;
        }
        .luxury-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 1000px;
        }
        .luxury-table th {
            text-align: center;
            padding: 1rem 0.8rem;
            background: rgba(0, 0, 0, 0.4);
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            color: #cbd5ff;
            border-bottom: 1px solid #2dd4bf40;
        }
        .luxury-table td {
            padding: 0.9rem 0.6rem;
            text-align: center;
            border-bottom: 1px solid rgba(45, 212, 191, 0.15);
            vertical-align: middle;
        }
        .luxury-table tr:hover td { background: rgba(45, 212, 191, 0.08); }
        .luxury-input {
            background: rgba(12, 20, 35, 0.9);
            border: 1px solid #2d3a5e;
            border-radius: 20px;
            padding: 8px 10px;
            width: 100%;
            max-width: 110px;
            text-align: center;
            font-weight: 500;
            color: #f0f3ff;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .luxury-input:focus {
            outline: none;
            border-color: #2dd4bf;
            box-shadow: 0 0 0 2px rgba(45, 212, 191, 0.3);
            background: #0a1428;
        }
        .team-input {
            max-width: 180px;
            text-align: left;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .total-gold {
            font-weight: 800;
            color: #FFD966;
            font-size: 1rem;
            text-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        .rank-badge { font-weight: 700; color: #7e8ef0; }
        .podium-table-wrapper {
            background: rgba(8, 14, 26, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 215, 0, 0.4);
            overflow-x: auto;
            margin-bottom: 2rem;
        }
        .podium-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1rem;
            min-width: 300px;
        }
        .podium-table th {
            background: rgba(0, 0, 0, 0.5);
            padding: 0.8rem;
            color: #FFD966;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #FFD700;
        }
        .podium-table td {
            padding: 0.8rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            font-weight: 500;
        }
        .podium-table tr:first-child td { font-weight: 800; color: #FFD700; }
        .podium-table tr:nth-child(2) td { color: #C0C0C0; }
        .podium-table tr:nth-child(3) td { color: #CD7F32; }
        .footer-note {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.7rem;
            color: #6a7c9e;
            border-top: 1px solid #2dd4bf30;
            padding-top: 1.2rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        @media (max-width: 780px) {
            body { padding: 1rem; }
            .luxury-input { max-width: 80px; font-size: 0.75rem; padding: 6px 5px; }
            .team-input { max-width: 130px; }
            .podium-table { font-size: 0.8rem; }
            .luxury-table { font-size: 0.75rem; min-width: 900px; }
            .luxury-table th, .luxury-table td { padding: 0.6rem 0.4rem; }
        }
    </style>
</head>
<body>
<div class="premium-container" id="posterArea">
    <div class="hero-section">
        <div class="title-area">
            <h1><i class="fas fa-crown"></i> FT RAMOT · SESI 19.00</h1>
            <div class="sub">
                <span><i class="fas fa-edit"></i> Edit langsung (Nama, M1, M2, M3, KILL, PLACE)</span>
                <span><i class="fas fa-chart-line"></i> TOTAL = KILL + PLACE</span>
            </div>
        </div>
    </div>

    <div class="action-bar" id="actionBar">
        <div class="btn-group">
            <button class="btn-premium btn-primary" id="addTeamBtn"><i class="fas fa-plus-circle"></i> Tambah Tim</button>
            <button class="btn-premium btn-danger" id="clearAllBtn"><i class="fas fa-trash-alt"></i> Hapus Semua</button>
        </div>
        <div class="btn-group">
            <button class="btn-premium btn-success" id="downloadPosterBtn"><i class="fas fa-camera"></i> Download Poster (PNG)</button>
            <button class="btn-premium btn-success" id="exportCsvBtn"><i class="fas fa-file-csv"></i> Export CSV</button>
            <span style="font-size:0.7rem; background: #0e1a2a80; padding: 4px 12px; border-radius: 30px;"><i class="fas fa-memory"></i> Auto-save</span>
        </div>
    </div>

    <div class="table-wrapper" id="tableWrapper">
        <table class="luxury-table" id="rankTable">
            <thead>
                <tr><th>#</th><th>TEAM</th><th>M1</th><th>M2</th><th>M3</th><th>KILL</th><th>PLACE</th><th>TOTAL</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="podium-table-wrapper">
        <table class="podium-table" id="podiumTable">
            <thead><tr><th>JUARA</th><th>NICKNAME</th><th>POINT</th></tr></thead>
            <tbody id="podiumBody"><tr><td>Juara 1</td><td>-</td><td>0</td></tr><tr><td>Juara 2</td><td>-</td><td>0</td></tr><tr><td>Juara 3</td><td>-</td><td>0</td></tr></tbody>
        </table>
    </div>

    <div class="footer-note">
        <span><i class="fas fa-chart-simple"></i> Sistem poin: Total = Kill + Place | M1, M2, M3 statistik per match</span>
        <span><i class="fas fa-database"></i> Data tersimpan otomatis</span>
    </div>
</div>

<script>
    // DEFAULT DATA: semua tim bernama "NEW TIM" dengan poin 0
    const DEFAULT_DATA = [
        { name: "NEW TIM", m1: 0, m2: 0, m3: 0, kill: 0, place: 0 },
        { name: "NEW TIM", m1: 0, m2: 0, m3: 0, kill: 0, place: 0 },
        { name: "NEW TIM", m1: 0, m2: 0, m3: 0, kill: 0, place: 0 },
        { name: "NEW TIM", m1: 0, m2: 0, m3: 0, kill: 0, place: 0 },
        { name: "NEW TIM", m1: 0, m2: 0, m3: 0, kill: 0, place: 0 },
        { name: "NEW TIM", m1: 0, m2: 0, m3: 0, kill: 0, place: 0 },
        { name: "NEW TIM", m1: 0, m2: 0, m3: 0, kill: 0, place: 0 },
        { name: "NEW TIM", m1: 0, m2: 0, m3: 0, kill: 0, place: 0 },
        { name: "NEW TIM", m1: 0, m2: 0, m3: 0, kill: 0, place: 0 },
        { name: "NEW TIM", m1: 0, m2: 0, m3: 0, kill: 0, place: 0 },
        { name: "NEW TIM", m1: 0, m2: 0, m3: 0, kill: 0, place: 0 },
        { name: "NEW TIM", m1: 0, m2: 0, m3: 0, kill: 0, place: 0 }
    ];

    let teams = [];
    function genId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 6); }
    function persist() { localStorage.setItem('ff_luxury_manager', JSON.stringify(teams.map(t => ({ id: t.id, name: t.name, m1: t.m1, m2: t.m2, m3: t.m3, kill: t.kill, place: t.place })))); }
    function load() {
        let raw = localStorage.getItem('ff_luxury_manager');
        if (raw) {
            try {
                let p = JSON.parse(raw);
                if (Array.isArray(p)) { teams = p.map(t => ({ id: t.id || genId(), name: t.name, m1: t.m1 ?? 0, m2: t.m2 ?? 0, m3: t.m3 ?? 0, kill: t.kill ?? 0, place: t.place ?? 0 })); return true; }
            } catch(e) {}
        }
        return false;
    }
    function setDefault() {
        teams = DEFAULT_DATA.map((d, i) => ({ id: genId()+'-'+i, name: d.name, m1: d.m1, m2: d.m2, m3: d.m3, kill: d.kill, place: d.place }));
        persist(); renderTable(); updatePodiumTable();
    }
    function getSortedByTotal() { return [...teams].sort((a,b) => (b.kill+b.place) - (a.kill+a.place)); }
    function updatePodiumTable() {
        const sorted = getSortedByTotal();
        const podiumBody = document.getElementById('podiumBody');
        podiumBody.innerHTML = '';
        const titles = ['Juara 1', 'Juara 2', 'Juara 3'];
        for (let i = 0; i < 3; i++) {
            const row = podiumBody.insertRow();
            row.insertCell(0).innerText = titles[i];
            if (sorted[i]) {
                row.insertCell(1).innerText = sorted[i].name;
                row.insertCell(2).innerText = sorted[i].kill + sorted[i].place;
            } else {
                row.insertCell(1).innerText = '-';
                row.insertCell(2).innerText = '0';
            }
        }
    }
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        if (teams.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:3rem;">Belum ada data</td><table>'; updatePodiumTable(); return; }
        teams.forEach((team, idx) => {
            let row = tbody.insertRow();
            row.insertCell(0).innerText = idx+1;
            let nameCell = row.insertCell(1);
            let nameInp = document.createElement('input'); nameInp.type='text'; nameInp.value=team.name; nameInp.className='luxury-input team-input';
            nameCell.appendChild(nameInp);
            let m1Cell = row.insertCell(2), m1Inp = document.createElement('input'); m1Inp.type='number'; m1Inp.value=team.m1; m1Inp.className='luxury-input'; m1Cell.appendChild(m1Inp);
            let m2Cell = row.insertCell(3), m2Inp = document.createElement('input'); m2Inp.type='number'; m2Inp.value=team.m2; m2Inp.className='luxury-input'; m2Cell.appendChild(m2Inp);
            let m3Cell = row.insertCell(4), m3Inp = document.createElement('input'); m3Inp.type='number'; m3Inp.value=team.m3; m3Inp.className='luxury-input'; m3Cell.appendChild(m3Inp);
            let killCell = row.insertCell(5), killInp = document.createElement('input'); killInp.type='number'; killInp.value=team.kill; killInp.className='luxury-input'; killCell.appendChild(killInp);
            let placeCell = row.insertCell(6), placeInp = document.createElement('input'); placeInp.type='number'; placeInp.value=team.place; placeInp.className='luxury-input'; placeCell.appendChild(placeInp);
            let totalCell = row.insertCell(7), totalSpan = document.createElement('span'); totalSpan.className='total-gold'; totalSpan.innerText=team.kill+team.place; totalCell.appendChild(totalSpan);
            const update = () => { let k=parseInt(killInp.value)||0, p=parseInt(placeInp.value)||0; totalSpan.innerText=k+p; persist(); updatePodiumTable(); };
            nameInp.onchange = () => { team.name = nameInp.value.trim()||'Nameless'; persist(); updatePodiumTable(); };
            m1Inp.onchange = () => { team.m1 = parseInt(m1Inp.value)||0; persist(); };
            m2Inp.onchange = () => { team.m2 = parseInt(m2Inp.value)||0; persist(); };
            m3Inp.onchange = () => { team.m3 = parseInt(m3Inp.value)||0; persist(); };
            killInp.onchange = () => { team.kill = parseInt(killInp.value)||0; update(); };
            placeInp.onchange = () => { team.place = parseInt(placeInp.value)||0; update(); };
            killInp.oninput = () => { let k=parseInt(killInp.value)||0, p=parseInt(placeInp.value)||0; totalSpan.innerText=k+p; };
            placeInp.oninput = () => { let k=parseInt(killInp.value)||0, p=parseInt(placeInp.value)||0; totalSpan.innerText=k+p; };
        });
        updatePodiumTable();
    }
    function addTeam() { teams.push({ id: genId(), name: "Tim Baru", m1:0,m2:0,m3:0,kill:0,place:0 }); renderTable(); persist(); }
    function clearAll() { if(confirm('Hapus semua data?')) { teams = []; renderTable(); persist(); } }
    
    async function downloadPoster() {
        const actionBar = document.getElementById('actionBar');
        const tableWrapper = document.getElementById('tableWrapper');
        // Sembunyikan toolbar
        const originalDisplay = actionBar.style.display;
        actionBar.style.display = 'none';
        // Simpan style asli wrapper
        const originalOverflowX = tableWrapper.style.overflowX;
        const originalWidth = tableWrapper.style.width;
        // Ubah agar tabel tidak terpotong saat screenshot
        tableWrapper.style.overflowX = 'visible';
        tableWrapper.style.width = 'max-content';
        tableWrapper.style.minWidth = '100%';
        
        const element = document.getElementById('posterArea');
        const btn = document.getElementById('downloadPosterBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Memproses...';
        btn.disabled = true;
        try {
            const canvas = await html2canvas(element, { 
                scale: 2.5,
                backgroundColor: '#03050b',
                logging: false,
                useCORS: true,
                windowWidth: element.scrollWidth,
                windowHeight: element.scrollHeight
            });
            const link = document.createElement('a');
            const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, '-');
            link.download = `FT_RAMOT_${timestamp}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        } catch(err) { 
            alert('Gagal membuat poster: ' + err.message); 
        } finally {
            // Kembalikan style wrapper
            tableWrapper.style.overflowX = originalOverflowX;
            tableWrapper.style.width = originalWidth;
            actionBar.style.display = originalDisplay;
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }
    
    function exportCSV() {
        if (!teams.length) { alert('Tidak ada data'); return; }
        let rows = [['#','TEAM','M1','M2','M3','KILL','PLACE','TOTAL'].join(',')];
        teams.forEach((t,i) => rows.push([i+1,`"${t.name.replace(/"/g,'""')}"`,t.m1,t.m2,t.m3,t.kill,t.place,t.kill+t.place].join(',')));
        let sorted = getSortedByTotal();
        rows.push(['', '=== PODIUM JUARA ===', '', '', '', '', '', '']);
        if(sorted[0]) rows.push(['Juara 1', sorted[0].name, '', '', '', '', '', sorted[0].kill+sorted[0].place]);
        if(sorted[1]) rows.push(['Juara 2', sorted[1].name, '', '', '', '', '', sorted[1].kill+sorted[1].place]);
        if(sorted[2]) rows.push(['Juara 3', sorted[2].name, '', '', '', '', '', sorted[2].kill+sorted[2].place]);
        let blob = new Blob([rows.join('\n')], {type:'text/csv;charset=utf-8;'});
        let a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `FT_RAMOT_data_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.csv`;
        a.click(); URL.revokeObjectURL(a.href);
    }
    
    function init() { if(!load() || teams.length===0) setDefault(); else { renderTable(); updatePodiumTable(); } }
    document.addEventListener('DOMContentLoaded', () => {
        init();
        document.getElementById('addTeamBtn').onclick = addTeam;
        document.getElementById('clearAllBtn').onclick = clearAll;
        document.getElementById('downloadPosterBtn').onclick = downloadPoster;
        document.getElementById('exportCsvBtn').onclick = exportCSV;
    });
</script>
</body>
</html>
