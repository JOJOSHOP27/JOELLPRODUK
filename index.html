<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>JOELL MOD — debug version</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        /* CSS sama persis seperti sebelumnya (saya ringkas agar tidak terlalu panjang, tapi tetap cantik) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #030514;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 16px;
            color: #eaeef2;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        .glass-panel {
            position: relative;
            z-index: 2;
            background: rgba(10,20,30,0.5);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(0,255,255,0.25);
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(0,255,255,0.2) inset, 0 0 60px rgba(0,180,255,0.3);
            padding: 28px;
            width: 100%;
            max-width: 1500px;
            margin: 0 auto;
        }
        .header-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; }
        .logo-area { display: flex; align-items: center; gap: 20px; }
        .logo-glow {
            width: 65px; height: 65px;
            border-radius: 20px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; color: white;
            box-shadow: 0 0 30px #00a6ff, 0 0 60px #0077ff;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .logo-text h1 {
            font-size: clamp(1.8rem,6vw,3rem);
            font-weight: 800;
            background: linear-gradient(145deg, #fff, #a0e9ff, #80d0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(0,255,255,0.5);
        }
        .logo-text p { color: #9fc9ff; font-size: 0.9rem; }
        .login-mini {
            display: flex; gap: 10px; align-items: center;
            background: rgba(0,20,40,0.7);
            padding: 8px 20px; border-radius: 60px;
            border: 1px solid #00a6ff;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }
        .login-mini input {
            background: rgba(0,0,0,0.5);
            border: 1px solid #00c8ff;
            border-radius: 40px;
            padding: 10px 18px;
            color: white;
            outline: none;
            min-width: 180px;
        }
        .btn-mini {
            background: transparent;
            border: 2px solid #00e0ff;
            color: #00e0ff;
            padding: 8px 22px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-logout {
            background: rgba(255,70,100,0.2);
            border: 1px solid #ff4d6d;
            color: #ffb3c1;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .upload-section {
            background: rgba(0,20,40,0.6);
            border-radius: 48px;
            padding: 28px;
            backdrop-filter: blur(15px);
            border: 1px solid #00a6ff;
            margin-bottom: 40px;
            box-shadow: 0 30px 50px -20px black, 0 0 0 1px cyan inset;
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .full-width { grid-column: span 2; }
        .neo-input {
            width: 100%;
            background: rgba(0,10,20,0.8);
            border: 1px solid #2f80ed;
            border-radius: 30px;
            padding: 14px 22px;
            color: white;
            outline: none;
        }
        .file-zone {
            background: #0a1a2aa0;
            border: 2px dashed #00a6ff;
            border-radius: 30px;
            padding: 22px;
            text-align: center;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, #0077ff40, #00c3ff40);
            border: 2px solid #00b8ff;
            color: #fff;
            padding: 16px 28px;
            border-radius: 60px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }
        .product-card {
            background: rgba(10,25,40,0.7);
            backdrop-filter: blur(12px);
            border: 1px solid #00a6ff;
            border-radius: 32px;
            padding: 18px;
            box-shadow: 0 15px 35px -15px black, 0 0 0 1px cyan inset;
        }
        .product-img {
            width: 100%; height: 150px; object-fit: cover;
            border-radius: 24px; border: 1px solid #0af;
            margin-bottom: 15px;
        }
        .product-img-placeholder {
            display: flex; align-items: center; justify-content: center;
            background: #102433; color: #6ab0ff; font-size: 3rem;
            height: 150px; border-radius: 24px; margin-bottom: 15px;
            border: 1px dashed #0af;
        }
        .product-title {
            font-size: 1.4rem; font-weight: 700;
            background: linear-gradient(135deg, #fff, #b3e5ff);
            -webkit-background-clip: text; background-clip: text;
            color: transparent; margin-bottom: 8px;
        }
        .product-desc {
            font-weight: 300; line-height: 1.6; color: #cfecff;
            max-height: 150px; overflow-y: auto; white-space: pre-line;
            font-size: 0.9rem; margin-bottom: 16px;
        }
        .delete-btn {
            background: rgba(255,40,80,0.2);
            border: 1px solid #ff3860; color: #ffb0c0;
            padding: 12px; border-radius: 36px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            gap: 8px; margin-top: auto;
        }
        .empty-state {
            grid-column: 1/-1; text-align: center; padding: 50px 20px;
            border: 2px dashed #2f80ed; border-radius: 60px;
            background: #0a1a2a60; backdrop-filter: blur(10px);
            color: #cce5ff;
        }
        footer { margin-top: 40px; text-align: center; opacity: 0.5; }
        .hidden { display: none !important; }
        @media (max-width:600px) { .form-grid { grid-template-columns:1fr; } .full-width { grid-column:span 1; } }
        #publicScreen, #adminScreen { width:100%; }
    </style>
</head>
<body>
    <div class="glass-panel" id="appWrapper">
        <!-- PUBLIC VIEW -->
        <div id="publicScreen">
            <div class="header-row">
                <div class="logo-area">
                    <div class="logo-glow"><i class="fa-regular fa-cube"></i></div>
                    <div class="logo-text"><h1>JOELL MOD</h1><p>next‑gen collection</p></div>
                </div>
                <div class="login-mini">
                    <input type="password" id="publicPassword" placeholder="admin password">
                    <button class="btn-mini" id="publicLoginBtn"><i class="fa-regular fa-lock-open"></i> login</button>
                </div>
            </div>
            <h2 style="margin:30px 0 15px;"><i class="fa-regular fa-grid-2" style="color:cyan;"></i> all products</h2>
            <div id="publicProducts" class="products-grid"></div>
            <footer>JOELL MOD · real‑time cloud sync</footer>
        </div>

        <!-- ADMIN VIEW -->
        <div id="adminScreen" class="hidden">
            <div class="header-row">
                <div class="logo-area">
                    <div class="logo-glow"><i class="fa-regular fa-cube"></i></div>
                    <div class="logo-text"><h1>JOELL MOD</h1><p>admin · vault master</p></div>
                </div>
                <button class="btn-logout" id="logoutBtn"><i class="fa-solid fa-sign-out-alt"></i> logout</button>
            </div>

            <div class="upload-section">
                <h2 style="margin-bottom:20px;"><i class="fa-regular fa-square-plus" style="color:cyan;"></i> upload new product</h2>
                <div class="form-grid">
                    <div><label>product name</label><input type="text" id="productName" class="neo-input" placeholder="e.g. JOELL X-1"></div>
                    <div class="full-width" style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                        <div><label>description (unlimited)</label><textarea id="productDesc" class="neo-input" rows="5" placeholder="describe without limits..."></textarea></div>
                        <div><label>product image (optional)</label>
                            <div class="file-zone" id="fileZone">
                                <i class="fa-regular fa-images"></i><span>click or drop (max 2MB)</span>
                                <input type="file" id="fileInput" accept="image/*" style="display:none;">
                                <img id="image-preview" alt="preview">
                            </div>
                        </div>
                    </div>
                </div>
                <button class="btn-primary" id="saveProductBtn" style="margin-top:25px;"><i class="fa-regular fa-cloud-arrow-up"></i> save to cloud</button>
            </div>

            <h2 style="margin:30px 0 15px;"><i class="fa-regular fa-grid-2" style="color:cyan;"></i> manage products</h2>
            <div id="adminProducts" class="products-grid"></div>
            <footer>JOELL MOD · admin · delete enabled</footer>
        </div>
    </div>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyAAbPeitbdnvQDDzgDky5Rm-WGBbCZ0zpM",
            authDomain: "joell-mod.firebaseapp.com",
            databaseURL: "https://joell-mod-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "joell-mod",
            storageBucket: "joell-mod.firebasestorage.app",
            messagingSenderId: "598453625335",
            appId: "1:598453625335:web:d483c1e21948295b2f8ef2",
            measurementId: "G-GXJPJYLVNS"
        };
        
        // Inisialisasi Firebase dengan penanganan error
        let database;
        try {
            firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            console.log('✅ Firebase initialized successfully');
        } catch (error) {
            console.error('❌ Firebase initialization error:', error);
            alert('Gagal menghubungkan ke database: ' + error.message);
        }
        
        const productsRef = database ? database.ref('products') : null;
        // =========================================================

        const PASSWORD = 'joellmod';

        // DOM elements
        const publicScreen = document.getElementById('publicScreen');
        const adminScreen = document.getElementById('adminScreen');
        const publicLoginBtn = document.getElementById('publicLoginBtn');
        const publicPassword = document.getElementById('publicPassword');
        const logoutBtn = document.getElementById('logoutBtn');
        const productName = document.getElementById('productName');
        const productDesc = document.getElementById('productDesc');
        const fileInput = document.getElementById('fileInput');
        const fileZone = document.getElementById('fileZone');
        const imagePreview = document.getElementById('image-preview');
        const saveBtn = document.getElementById('saveProductBtn');
        const publicContainer = document.getElementById('publicProducts');
        const adminContainer = document.getElementById('adminProducts');

        let products = [];

        // Auth state
        const AUTH_KEY = 'joellmod_auth';

        function checkAuth() {
            const isAuth = localStorage.getItem(AUTH_KEY) === 'true';
            if (isAuth) showAdmin(); else showPublic();
        }

        function showPublic() {
            publicScreen.classList.remove('hidden');
            adminScreen.classList.add('hidden');
        }

        function showAdmin() {
            publicScreen.classList.add('hidden');
            adminScreen.classList.remove('hidden');
        }

        publicLoginBtn.addEventListener('click', () => {
            if (publicPassword.value.trim() === PASSWORD) {
                localStorage.setItem(AUTH_KEY, 'true');
                showAdmin();
            } else {
                alert('❌ wrong password');
            }
        });
        publicPassword.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') publicLoginBtn.click();
        });

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem(AUTH_KEY);
            showPublic();
            publicPassword.value = '';
        });

        // ========== CEK KONEKSI FIREBASE ==========
        if (!productsRef) {
            alert('Firebase not initialized. Refresh or check config.');
        } else {
            // Coba baca database sekali untuk tes koneksi
            productsRef.once('value', (snapshot) => {
                console.log('✅ Database connection successful. Data:', snapshot.val());
            }).catch((error) => {
                console.error('❌ Database read error:', error);
                alert('Gagal membaca database: ' + error.message + '\nCek aturan keamanan Firebase.');
            });

            // Realtime listener
            productsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                console.log('📦 Data from Firebase:', data);
                if (data) {
                    products = Object.keys(data).map(key => ({
                        id: key,
                        ...data[key]
                    }));
                } else {
                    products = [];
                }
                renderAllProducts();
            }, (error) => {
                console.error('❌ Listener error:', error);
                alert('Gagal mendapatkan data realtime: ' + error.message);
            });
        }

        function saveProductToFirebase(product) {
            if (!productsRef) return alert('Database tidak tersedia');
            productsRef.push(product)
                .then(() => console.log('✅ Product saved'))
                .catch(err => {
                    console.error('❌ Save error:', err);
                    alert('Gagal menyimpan: ' + err.message);
                });
        }

        function deleteProductFromFirebase(id) {
            if (!productsRef) return;
            productsRef.child(id).remove()
                .then(() => console.log('✅ Product deleted'))
                .catch(err => {
                    console.error('❌ Delete error:', err);
                    alert('Gagal menghapus: ' + err.message);
                });
        }

        function renderAllProducts() {
            // Public
            if (products.length === 0) {
                publicContainer.innerHTML = `<div class="empty-state"><i class="fa-regular fa-box-open" style="font-size:4rem; display:block; margin-bottom:20px;"></i>no products yet</div>`;
            } else {
                let html = '';
                products.forEach(prod => {
                    const hasImage = prod.image && prod.image.startsWith('data:image');
                    html += `
                        <div class="product-card">
                            ${hasImage ? `<img src="${prod.image}" class="product-img" alt="product">` : `<div class="product-img-placeholder"><i class="fa-regular fa-image"></i></div>`}
                            <div class="product-title">${escapeHTML(prod.name) || 'untitled'}</div>
                            <div class="product-desc">${escapeHTML(prod.desc) || '— no description —'}</div>
                        </div>
                    `;
                });
                publicContainer.innerHTML = html;
            }

            // Admin
            if (products.length === 0) {
                adminContainer.innerHTML = `<div class="empty-state"><i class="fa-regular fa-box-open" style="font-size:4rem; display:block; margin-bottom:20px;"></i>no products yet · upload first</div>`;
            } else {
                let html = '';
                products.forEach(prod => {
                    const hasImage = prod.image && prod.image.startsWith('data:image');
                    html += `
                        <div class="product-card" data-id="${prod.id}">
                            ${hasImage ? `<img src="${prod.image}" class="product-img" alt="product">` : `<div class="product-img-placeholder"><i class="fa-regular fa-image"></i></div>`}
                            <div class="product-title">${escapeHTML(prod.name) || 'untitled'}</div>
                            <div class="product-desc">${escapeHTML(prod.desc) || '— no description —'}</div>
                            <button class="delete-btn" data-id="${prod.id}"><i class="fa-regular fa-trash-can"></i> delete product</button>
                        </div>
                    `;
                });
                adminContainer.innerHTML = html;
                document.querySelectorAll('#adminProducts .delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.getAttribute('data-id');
                        deleteProductFromFirebase(id);
                    });
                });
            }
        }

        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>"]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        // Image preview
        fileZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) {
                alert('Max file size 2MB');
                fileInput.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = (event) => {
                imagePreview.src = event.target.result;
                imagePreview.style.display = 'block';
                fileZone.setAttribute('data-preview', event.target.result);
            };
            reader.readAsDataURL(file);
        });

        // Save product
        saveBtn.addEventListener('click', () => {
            const name = productName.value.trim();
            const desc = productDesc.value.trim();
            if (!name) {
                alert('Product name is required');
                return;
            }

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                if (file.size > 2 * 1024 * 1024) {
                    alert('image too large (max 2MB)');
                    return;
                }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    finishSave(name, desc, ev.target.result);
                };
                reader.readAsDataURL(file);
            } else {
                finishSave(name, desc, null);
            }
        });

        function finishSave(name, desc, imageBase64) {
            const newProduct = {
                name: name,
                desc: desc,
                image: imageBase64,
                createdAt: new Date().toISOString()
            };
            saveProductToFirebase(newProduct);

            // reset
            productName.value = '';
            productDesc.value = '';
            fileInput.value = '';
            imagePreview.style.display = 'none';
            imagePreview.src = '';
            fileZone.removeAttribute('data-preview');
        }

        // Drag & drop
        fileZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileZone.style.borderColor = '#ff0';
            fileZone.style.background = '#0a3a4a';
        });
        fileZone.addEventListener('dragleave', () => {
            fileZone.style.borderColor = '#00a6ff';
            fileZone.style.background = '#0a1a2aa0';
        });
        fileZone.addEventListener('drop', (e) => {
            e.preventDefault();
            fileZone.style.borderColor = '#00a6ff';
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('image/')) {
                fileInput.files = files;
                const event = new Event('change', { bubbles: true });
                fileInput.dispatchEvent(event);
            } else {
                alert('please drop an image');
            }
        });

        // initial check
        checkAuth();
    </script>
</body>
</html>
