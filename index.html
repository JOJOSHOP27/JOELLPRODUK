<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FT RAMOT · SESI 19.00</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(ellipse at 20% 30%, #0a0f2a, #03050b);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
            color: #edf2ff;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .card {
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1rem 1.2rem;
            margin-bottom: 1.2rem;
            border: 1px solid rgba(0,255,255,0.3);
        }
        h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-shadow: 0 0 4px cyan;
        }
        .sub {
            font-size: 0.75rem;
            color: #a0b3d9;
            margin-top: 4px;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 1.2rem;
        }
        button {
            background: rgba(20,30,55,0.85);
            border: 1px solid #2dd4bf;
            padding: 6px 14px;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #1e2a4a; transform: translateY(-1px); }
        button.danger { border-color: #f87171; }
        button.warning { border-color: #f97316; }
        
        /* Tabel dengan fixed layout - semua kolom rapat tapi proporsional */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.35);
            border-radius: 1rem;
            overflow: hidden;
            table-layout: fixed;
        }
        th, td {
            border: 1px solid rgba(45,212,191,0.3);
            padding: 8px 4px;
            text-align: center;
            vertical-align: middle;
        }
        th {
            background: #0a0f1f;
            color: #cbd5ff;
            font-weight: 600;
        }
        /* Lebar kolom tetap dalam persen */
        th:nth-child(1), td:nth-child(1) { width: 5%; }   /* # */
        th:nth-child(2), td:nth-child(2) { width: 30%; }  /* TEAM */
        th:nth-child(3), td:nth-child(3) { width: 8%; }   /* M1 */
        th:nth-child(4), td:nth-child(4) { width: 8%; }   /* M2 */
        th:nth-child(5), td:nth-child(5) { width: 8%; }   /* M3 */
        th:nth-child(6), td:nth-child(6) { width: 10%; }  /* KILL */
        th:nth-child(7), td:nth-child(7) { width: 10%; }  /* PLACE */
        th:nth-child(8), td:nth-child(8) { width: 12%; }  /* TOTAL */
        
        input {
            width: 100%;
            background: #0f172acc;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 6px 4px;
            text-align: center;
            color: white;
            font-size: 0.8rem;
        }
        .team-input {
            text-align: left;
            padding-left: 8px;
        }
        .total-cell {
            font-weight: bold;
            color: #facc15;
            font-size: 0.9rem;
        }
        .podium {
            margin-top: 1.2rem;
            border: 1px solid #facc1540;
            border-radius: 1rem;
            overflow: hidden;
        }
        .podium th, .podium td {
            width: auto;
        }
        .podium th:nth-child(1), .podium td:nth-child(1) { width: 25%; }
        .podium th:nth-child(2), .podium td:nth-child(2) { width: 50%; }
        .podium th:nth-child(3), .podium td:nth-child(3) { width: 25%; }
        .podium th { background: #1e1b2a; color: #facc15; }
        .podium tr:first-child td { color: #FFD700; font-weight: bold; }
        .podium tr:nth-child(2) td { color: #C0C0C0; }
        .podium tr:nth-child(3) td { color: #CD7F32; }
        .footer {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 1rem;
            padding-top: 0.7rem;
            border-top: 1px solid #2dd4bf30;
            color: #6a7c9e;
            display: flex;
            justify-content: space-between;
        }
        @media (max-width: 700px) {
            body { padding: 12px; }
            th, td { padding: 5px 2px; font-size: 0.75rem; }
            input { font-size: 0.7rem; padding: 4px 2px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="container" id="posterArea">
    <div class="card">
        <h1>🏆 FT RAMOT · SESI 19.00</h1>
        <div class="sub">Edit langsung (Nama, M1, M2, M3, KILL, PLACE) | TOTAL = KILL + PLACE</div>
    </div>

    <div class="toolbar" id="toolbar">
        <div>
            <button id="addBtn">+ Tambah Tim</button>
            <button id="resetBtn" class="warning">↺ Reset</button>
            <button id="clearBtn" class="danger">🗑 Hapus Semua</button>
        </div>
        <div>
            <button id="posterBtn">📸 Download Poster (PNG)</button>
            <button id="csvBtn">📄 Export CSV</button>
            <span style="font-size:0.7rem;">💾 Auto-save</span>
        </div>
    </div>

    <div style="overflow-x: auto; border-radius: 1rem;">
        <table id="mainTable">
            <thead>
                <tr><th>#</th><th>TEAM</th><th>M1</th><th>M2</th><th>M3</th><th>KILL</th><th>PLACE</th><th>TOTAL</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="podium">
        <table style="width:100%">
            <thead><tr><th>JUARA</th><th>NICKNAME</th><th>POINT</th></tr></thead>
            <tbody id="podiumBody"><tr><td>Juara 1</td><td>-</td><td>0</td></tr><tr><td>Juara 2</td><td>-</td><td>0</td></tr><tr><td>Juara 3</td><td>-</td><td>0</td></tr></tbody>
        </table>
    </div>

    <div class="footer">
        <span>📊 Total = KILL + PLACE | M1-M3 statistik per match</span>
        <span>💾 Data tersimpan otomatis di browser</span>
    </div>
</div>

<script>
    let teams = [];
    const DEFAULT_TEAMS = Array(12).fill().map(() => ({ name: "NEW TIM", m1: 0, m2: 0, m3: 0, kill: 0, place: 0 }));

    function save() { localStorage.setItem('ft_ramot_dempet', JSON.stringify(teams)); }
    function load() {
        let data = localStorage.getItem('ft_ramot_dempet');
        if (data) {
            try { teams = JSON.parse(data); if (Array.isArray(teams) && teams.length) return true; } catch(e) {}
        }
        return false;
    }

    function updatePodium() {
        const sorted = [...teams].sort((a,b) => (b.kill+b.place) - (a.kill+a.place));
        const podiumBody = document.getElementById('podiumBody');
        podiumBody.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            let row = podiumBody.insertRow();
            row.insertCell(0).innerText = `Juara ${i+1}`;
            if (sorted[i]) {
                row.insertCell(1).innerText = sorted[i].name;
                row.insertCell(2).innerText = sorted[i].kill + sorted[i].place;
            } else {
                row.insertCell(1).innerText = '-';
                row.insertCell(2).innerText = '0';
            }
        }
    }

    function render() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        if (teams.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:1rem;">Belum ada data</td></tr>';
            updatePodium();
            return;
        }
        teams.forEach((team, idx) => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = idx+1;
            // TEAM
            const nameCell = row.insertCell(1);
            const nameInput = document.createElement('input');
            nameInput.type = 'text';
            nameInput.value = team.name;
            nameInput.classList.add('team-input');
            nameCell.appendChild(nameInput);
            // M1
            const m1Cell = row.insertCell(2);
            const m1Input = document.createElement('input');
            m1Input.type = 'number'; m1Input.value = team.m1;
            m1Cell.appendChild(m1Input);
            // M2
            const m2Cell = row.insertCell(3);
            const m2Input = document.createElement('input');
            m2Input.type = 'number'; m2Input.value = team.m2;
            m2Cell.appendChild(m2Input);
            // M3
            const m3Cell = row.insertCell(4);
            const m3Input = document.createElement('input');
            m3Input.type = 'number'; m3Input.value = team.m3;
            m3Cell.appendChild(m3Input);
            // KILL
            const killCell = row.insertCell(5);
            const killInput = document.createElement('input');
            killInput.type = 'number'; killInput.value = team.kill;
            killCell.appendChild(killInput);
            // PLACE
            const placeCell = row.insertCell(6);
            const placeInput = document.createElement('input');
            placeInput.type = 'number'; placeInput.value = team.place;
            placeCell.appendChild(placeInput);
            // TOTAL
            const totalCell = row.insertCell(7);
            const totalSpan = document.createElement('span');
            totalSpan.className = 'total-cell';
            totalSpan.innerText = team.kill + team.place;
            totalCell.appendChild(totalSpan);

            // event handlers
            const updateTotal = () => {
                let k = parseInt(killInput.value) || 0;
                let p = parseInt(placeInput.value) || 0;
                totalSpan.innerText = k + p;
                save();
                updatePodium();
            };
            nameInput.onchange = () => { team.name = nameInput.value.trim() || 'Nameless'; save(); updatePodium(); };
            m1Input.onchange = () => { team.m1 = parseInt(m1Input.value) || 0; save(); };
            m2Input.onchange = () => { team.m2 = parseInt(m2Input.value) || 0; save(); };
            m3Input.onchange = () => { team.m3 = parseInt(m3Input.value) || 0; save(); };
            killInput.onchange = () => { team.kill = parseInt(killInput.value) || 0; updateTotal(); };
            placeInput.onchange = () => { team.place = parseInt(placeInput.value) || 0; updateTotal(); };
            killInput.oninput = () => { let k = parseInt(killInput.value)||0, p = parseInt(placeInput.value)||0; totalSpan.innerText = k+p; };
            placeInput.oninput = () => { let k = parseInt(killInput.value)||0, p = parseInt(placeInput.value)||0; totalSpan.innerText = k+p; };
        });
        updatePodium();
    }

    function addTeam() { teams.push({ name: "NEW TIM", m1:0, m2:0, m3:0, kill:0, place:0 }); render(); save(); }
    function resetDefault() { teams = DEFAULT_TEAMS.map(t => ({ ...t })); render(); save(); }
    function clearAll() { if(confirm('Hapus semua tim?')) { teams = []; render(); save(); } }

    async function downloadPoster() {
        // Simpan semua input menjadi span sementara
        const inputs = document.querySelectorAll('#mainTable input');
        const replacements = [];
        inputs.forEach(inp => {
            const span = document.createElement('span');
            span.innerText = inp.value;
            span.style.display = 'inline-block';
            span.style.width = '100%';
            span.style.textAlign = inp.classList.contains('team-input') ? 'left' : 'center';
            span.style.padding = '6px 4px';
            span.style.color = '#f0f3ff';
            span.style.fontSize = '0.8rem';
            if (inp.classList.contains('team-input')) span.style.fontWeight = '600';
            replacements.push({ parent: inp.parentNode, input: inp, span });
            inp.parentNode.replaceChild(span, inp);
        });
        const toolbar = document.getElementById('toolbar');
        const origToolbar = toolbar.style.display;
        toolbar.style.display = 'none';
        try {
            const el = document.getElementById('posterArea');
            const canvas = await html2canvas(el, { scale: 2.5, backgroundColor: '#03050b', logging: false, useCORS: true, windowWidth: el.scrollWidth, windowHeight: el.scrollHeight });
            const link = document.createElement('a');
            link.download = `FT_RAMOT_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        } catch(e) { alert('Gagal membuat poster'); }
        finally {
            replacements.forEach(r => r.parent.replaceChild(r.input, r.span));
            toolbar.style.display = origToolbar;
        }
    }

    function exportCSV() {
        if (!teams.length) { alert('Tidak ada data'); return; }
        let rows = [['#','TEAM','M1','M2','M3','KILL','PLACE','TOTAL'].join(',')];
        teams.forEach((t,i) => rows.push([i+1, `"${t.name.replace(/"/g,'""')}"`, t.m1, t.m2, t.m3, t.kill, t.place, t.kill+t.place].join(',')));
        let sorted = [...teams].sort((a,b) => (b.kill+b.place) - (a.kill+a.place));
        rows.push(['', '=== PODIUM ===', '', '', '', '', '', '']);
        if(sorted[0]) rows.push(['Juara 1', sorted[0].name, '', '', '', '', '', sorted[0].kill+sorted[0].place]);
        if(sorted[1]) rows.push(['Juara 2', sorted[1].name, '', '', '', '', '', sorted[1].kill+sorted[1].place]);
        if(sorted[2]) rows.push(['Juara 3', sorted[2].name, '', '', '', '', '', sorted[2].kill+sorted[2].place]);
        const blob = new Blob([rows.join('\n')], {type: 'text/csv;charset=utf-8'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `FT_RAMOT_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.csv`;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    if (!load() || teams.length === 0) resetDefault();
    else render();

    document.getElementById('addBtn').onclick = addTeam;
    document.getElementById('resetBtn').onclick = resetDefault;
    document.getElementById('clearBtn').onclick = clearAll;
    document.getElementById('posterBtn').onclick = downloadPoster;
    document.getElementById('csvBtn').onclick = exportCSV;
</script>
</body>
</html>
