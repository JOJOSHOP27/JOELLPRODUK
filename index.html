<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FT JOELL - Turnamen Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(ellipse at 20% 30%, #0a0f2a, #03050b);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            color: #edf2ff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Header dengan logo yang bisa di-upload */
        .hero-section {
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(0,255,255,0.3);
            text-align: center;
        }
        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .logo-preview {
            max-width: 100%;
            background: transparent;   /* HILANGKAN BACKGROUND GELAP */
            border-radius: 1rem;
            padding: 10px;
            display: inline-block;
        }
        /* Tinggi logo dibatasi seperti awal (120px), lebar fleksibel */
        .logo-preview img {
            max-height: 120px;
            width: auto;
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }
        .upload-btn {
            background: rgba(30, 40, 60, 0.9);
            border: 1px solid #2dd4bf;
            padding: 6px 14px;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .upload-btn:hover {
            background: #1e2a4a;
            transform: translateY(-1px);
        }
        .sub {
            font-size: 0.8rem;
            color: #a0b3d9;
            margin-top: 8px;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 10px;
            margin: 1rem 0 1.2rem;
        }
        button {
            background: rgba(20,30,55,0.85);
            border: 1px solid #2dd4bf;
            padding: 8px 16px;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #1e2a4a; transform: translateY(-1px); }
        button.danger { border-color: #f87171; }
        button.warning { border-color: #f97316; }
        
        /* Tabel rapat (perdempet) */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 1rem;
            margin-bottom: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1rem;
            background: rgba(0,0,0,0.35);
            border-radius: 1rem;
            overflow: hidden;
            table-layout: fixed;
        }
        th, td {
            border: 1px solid rgba(45,212,191,0.3);
            padding: 10px 6px;
            text-align: center;
            vertical-align: middle;
        }
        th {
            background: #0a0f1f;
            color: #cbd5ff;
            font-weight: 700;
            font-size: 0.9rem;
        }
        /* Lebar kolom persentase agar rapat */
        th:nth-child(1), td:nth-child(1) { width: 5%; }
        th:nth-child(2), td:nth-child(2) { width: 28%; }
        th:nth-child(3), td:nth-child(3) { width: 8%; }
        th:nth-child(4), td:nth-child(4) { width: 8%; }
        th:nth-child(5), td:nth-child(5) { width: 8%; }
        th:nth-child(6), td:nth-child(6) { width: 10%; }
        th:nth-child(7), td:nth-child(7) { width: 10%; }
        th:nth-child(8), td:nth-child(8) { width: 12%; }
        
        input {
            width: 100%;
            background: #0f172acc;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 8px 5px;
            text-align: center;
            color: white;
            font-size: 0.9rem;
        }
        .team-input {
            text-align: left;
            padding-left: 8px;
        }
        .total-cell {
            font-weight: bold;
            color: #facc15;
            font-size: 1rem;
        }
        .podium {
            margin-top: 1.5rem;
            border: 1px solid #facc1540;
            border-radius: 1rem;
            overflow: hidden;
        }
        .podium table {
            font-size: 1rem;
            table-layout: fixed;
        }
        .podium th, .podium td {
            padding: 10px 6px;
        }
        .podium th:nth-child(1), .podium td:nth-child(1) { width: 25%; }
        .podium th:nth-child(2), .podium td:nth-child(2) { width: 50%; }
        .podium th:nth-child(3), .podium td:nth-child(3) { width: 25%; }
        .podium th { background: #1e1b2a; color: #facc15; font-size: 0.9rem; }
        .podium tr:first-child td i { color: #FFD700; }
        .podium tr:nth-child(2) td i { color: #C0C0C0; }
        .podium tr:nth-child(3) td i { color: #CD7F32; }
        .podium td i {
            margin-right: 8px;
            font-size: 1.1rem;
        }
        .footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 0.8rem;
            border-top: 1px solid #2dd4bf30;
            color: #6a7c9e;
            display: flex;
            justify-content: space-between;
        }
        @media (max-width: 800px) {
            body { padding: 12px; }
            .logo-preview img { max-height: 90px; }
            table, .podium table { font-size: 0.85rem; }
            th, td { padding: 6px 3px; }
            input { font-size: 0.8rem; padding: 5px 3px; }
            .team-input { padding-left: 5px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="container" id="posterArea">
    <div class="hero-section">
        <div class="logo-area">
            <div class="logo-preview" id="logoPreview">
                <img id="logoImg" src="" alt="Logo Turnamen" style="display: none;">
                <!-- Teks default jika belum upload logo -->
                <div id="defaultTitle" style="font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: #FFD966; text-shadow: 2px 2px 4px black;">FT JOELL<br>SESI 19:00</div>
            </div>
            <label class="upload-btn">
                <i class="fas fa-upload"></i> Upload Logo / Judul
                <input type="file" id="logoUpload" accept="image/*" style="display: none;">
            </label>
            <div class="sub">Edit langsung (Nama, M1, M2, M3, KILL, PLACE) | TOTAL = KILL + PLACE</div>
        </div>
    </div>

    <div class="toolbar" id="toolbar">
        <div>
            <button id="addBtn">+ Tambah Tim</button>
            <button id="resetBtn" class="warning">↺ Reset</button>
            <button id="clearBtn" class="danger">🗑 Hapus Semua</button>
        </div>
        <div>
            <button id="posterBtn">📸 Download Poster (PNG)</button>
            <button id="csvBtn">📄 Export CSV</button>
            <span style="font-size:0.75rem;">💾 Auto-save</span>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="mainTable">
            <thead>
                <tr><th>#</th><th>TEAM</th><th>M1</th><th>M2</th><th>M3</th><th>KILL</th><th>PLACE</th><th>TOTAL</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="podium">
        <table style="width:100%">
            <thead><tr><th>JUARA</th><th>NICKNAME</th><th>POINT</th></tr></thead>
            <tbody id="podiumBody">
                <tr><td><i class="fas fa-medal"></i> Juara 1<br>🥇</td><td>-</td><td>0</td></tr>
                <tr><td><i class="fas fa-medal"></i> Juara 2<br>🥈</td><td>-</td><td>0</td></tr>
                <tr><td><i class="fas fa-medal"></i> Juara 3<br>🥉</td><td>-</td><td>0</td></tr>
            </tbody>
        </table>
    </div>

    <div class="footer">
        <span>📊 Total = KILL + PLACE | M1-M3 statistik per match</span>
        <span>💾 Data tersimpan otomatis di browser</span>
    </div>
</div>

<script>
    // ======================== DATA TIM ========================
    let teams = [];
    const DEFAULT_TEAMS = Array(12).fill().map(() => ({ name: "NEW TIM", m1: 0, m2: 0, m3: 0, kill: 0, place: 0 }));

    function saveTeams() { localStorage.setItem('ft_joell_teams', JSON.stringify(teams)); }
    function loadTeams() {
        let data = localStorage.getItem('ft_joell_teams');
        if (data) {
            try { teams = JSON.parse(data); if (Array.isArray(teams) && teams.length) return true; } catch(e) {}
        }
        return false;
    }

    // ======================== LOGO / JUDUL UPLOAD ========================
    const logoInput = document.getElementById('logoUpload');
    const logoImg = document.getElementById('logoImg');
    const defaultTitleDiv = document.getElementById('defaultTitle');
    
    function saveLogoToLocalStorage(dataUrl) {
        localStorage.setItem('ft_joell_logo', dataUrl);
    }
    function loadLogoFromLocalStorage() {
        const savedLogo = localStorage.getItem('ft_joell_logo');
        if (savedLogo && savedLogo.startsWith('data:image')) {
            logoImg.src = savedLogo;
            logoImg.style.display = 'block';
            defaultTitleDiv.style.display = 'none';
        } else {
            logoImg.style.display = 'none';
            defaultTitleDiv.style.display = 'block';
        }
    }
    logoInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                const imgData = ev.target.result;
                logoImg.src = imgData;
                logoImg.style.display = 'block';
                defaultTitleDiv.style.display = 'none';
                saveLogoToLocalStorage(imgData);
            };
            reader.readAsDataURL(file);
        }
    });
    document.querySelector('.upload-btn').addEventListener('click', function() {
        logoInput.click();
    });

    // ======================== PEMBARUAN PODIUM ========================
    function updatePodium() {
        const sorted = [...teams].sort((a,b) => (b.kill+b.place) - (a.kill+a.place));
        const podiumBody = document.getElementById('podiumBody');
        podiumBody.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            let row = podiumBody.insertRow();
            let cellJuara = row.insertCell(0);
            let icon = document.createElement('i');
            icon.className = 'fas fa-medal';
            cellJuara.appendChild(icon);
            cellJuara.appendChild(document.createTextNode(` Juara ${i+1}`));
            if (sorted[i]) {
                row.insertCell(1).innerText = sorted[i].name;
                row.insertCell(2).innerText = sorted[i].kill + sorted[i].place;
            } else {
                row.insertCell(1).innerText = '-';
                row.insertCell(2).innerText = '0';
            }
        }
        const rows = podiumBody.querySelectorAll('tr');
        if (rows[0]) rows[0].cells[0].querySelector('i').style.color = '#FFD700';
        if (rows[1]) rows[1].cells[0].querySelector('i').style.color = '#C0C0C0';
        if (rows[2]) rows[2].cells[0].querySelector('i').style.color = '#CD7F32';
    }

    // ======================== RENDER TABEL UTAMA ========================
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        if (teams.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:1rem;">Belum ada data</td><tr>';
            updatePodium();
            return;
        }
        teams.forEach((team, idx) => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = idx+1;
            // TEAM
            const nameCell = row.insertCell(1);
            const nameInput = document.createElement('input');
            nameInput.type = 'text';
            nameInput.value = team.name;
            nameInput.classList.add('team-input');
            nameCell.appendChild(nameInput);
            // M1
            const m1Cell = row.insertCell(2);
            const m1Input = document.createElement('input');
            m1Input.type = 'number'; m1Input.value = team.m1;
            m1Cell.appendChild(m1Input);
            // M2
            const m2Cell = row.insertCell(3);
            const m2Input = document.createElement('input');
            m2Input.type = 'number'; m2Input.value = team.m2;
            m2Cell.appendChild(m2Input);
            // M3
            const m3Cell = row.insertCell(4);
            const m3Input = document.createElement('input');
            m3Input.type = 'number'; m3Input.value = team.m3;
            m3Cell.appendChild(m3Input);
            // KILL
            const killCell = row.insertCell(5);
            const killInput = document.createElement('input');
            killInput.type = 'number'; killInput.value = team.kill;
            killCell.appendChild(killInput);
            // PLACE
            const placeCell = row.insertCell(6);
            const placeInput = document.createElement('input');
            placeInput.type = 'number'; placeInput.value = team.place;
            placeCell.appendChild(placeInput);
            // TOTAL
            const totalCell = row.insertCell(7);
            const totalSpan = document.createElement('span');
            totalSpan.className = 'total-cell';
            totalSpan.innerText = team.kill + team.place;
            totalCell.appendChild(totalSpan);

            const updateTotal = () => {
                let k = parseInt(killInput.value) || 0;
                let p = parseInt(placeInput.value) || 0;
                totalSpan.innerText = k + p;
                team.kill = k;
                team.place = p;
                saveTeams();
                updatePodium();
            };
            nameInput.onchange = () => { team.name = nameInput.value.trim() || 'Nameless'; saveTeams(); updatePodium(); };
            m1Input.onchange = () => { team.m1 = parseInt(m1Input.value) || 0; saveTeams(); };
            m2Input.onchange = () => { team.m2 = parseInt(m2Input.value) || 0; saveTeams(); };
            m3Input.onchange = () => { team.m3 = parseInt(m3Input.value) || 0; saveTeams(); };
            killInput.onchange = () => { team.kill = parseInt(killInput.value) || 0; updateTotal(); };
            placeInput.onchange = () => { team.place = parseInt(placeInput.value) || 0; updateTotal(); };
            killInput.oninput = () => { let k = parseInt(killInput.value)||0, p = parseInt(placeInput.value)||0; totalSpan.innerText = k+p; };
            placeInput.oninput = () => { let k = parseInt(killInput.value)||0, p = parseInt(placeInput.value)||0; totalSpan.innerText = k+p; };
        });
        updatePodium();
    }

    function addTeam() {
        teams.push({ name: "NEW TIM", m1: 0, m2: 0, m3: 0, kill: 0, place: 0 });
        renderTable();
        saveTeams();
    }
    function resetDefault() {
        teams = DEFAULT_TEAMS.map(t => ({ ...t }));
        renderTable();
        saveTeams();
    }
    function clearAll() {
        if (confirm('Hapus semua data tim?')) {
            teams = [];
            renderTable();
            saveTeams();
        }
    }

    // ======================== DOWNLOAD POSTER ========================
    async function downloadPoster() {
        // Ubah semua input di tabel menjadi span
        const inputs = document.querySelectorAll('#mainTable input');
        const replacements = [];
        inputs.forEach(inp => {
            const span = document.createElement('span');
            span.innerText = inp.value;
            span.style.display = 'inline-block';
            span.style.width = '100%';
            span.style.textAlign = inp.classList.contains('team-input') ? 'left' : 'center';
            span.style.padding = '8px 5px';
            span.style.color = '#f0f3ff';
            span.style.fontSize = '0.9rem';
            if (inp.classList.contains('team-input')) span.style.fontWeight = '600';
            replacements.push({ parent: inp.parentNode, input: inp, span });
            inp.parentNode.replaceChild(span, inp);
        });

        // Sembunyikan toolbar
        const toolbar = document.getElementById('toolbar');
        const origToolbarDisplay = toolbar.style.display;
        toolbar.style.display = 'none';

        // Sembunyikan tombol upload logo
        const uploadBtn = document.querySelector('.upload-btn');
        const origUploadDisplay = uploadBtn.style.display;
        uploadBtn.style.display = 'none';

        try {
            const element = document.getElementById('posterArea');
            const canvas = await html2canvas(element, {
                scale: 2.5,
                backgroundColor: '#03050b',
                logging: false,
                useCORS: true,
                allowTaint: false,
                windowWidth: element.scrollWidth,
                windowHeight: element.scrollHeight
            });
            const link = document.createElement('a');
            const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, '-');
            link.download = `FT_JOELL_${timestamp}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        } catch(e) {
            alert('Gagal membuat poster: ' + e.message);
        } finally {
            // Kembalikan input
            replacements.forEach(r => r.parent.replaceChild(r.input, r.span));
            toolbar.style.display = origToolbarDisplay;
            uploadBtn.style.display = origUploadDisplay;
        }
    }

    // ======================== EXPORT CSV ========================
    function exportCSV() {
        if (!teams.length) { alert('Tidak ada data'); return; }
        let rows = [['#','TEAM','M1','M2','M3','KILL','PLACE','TOTAL'].join(',')];
        teams.forEach((t,i) => rows.push([i+1, `"${t.name.replace(/"/g,'""')}"`, t.m1, t.m2, t.m3, t.kill, t.place, t.kill+t.place].join(',')));
        let sorted = [...teams].sort((a,b) => (b.kill+b.place) - (a.kill+a.place));
        rows.push(['', '=== PODIUM ===', '', '', '', '', '', '']);
        if(sorted[0]) rows.push(['Juara 1', sorted[0].name, '', '', '', '', '', sorted[0].kill+sorted[0].place]);
        if(sorted[1]) rows.push(['Juara 2', sorted[1].name, '', '', '', '', '', sorted[1].kill+sorted[1].place]);
        if(sorted[2]) rows.push(['Juara 3', sorted[2].name, '', '', '', '', '', sorted[2].kill+sorted[2].place]);
        const blob = new Blob([rows.join('\n')], {type: 'text/csv;charset=utf-8'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `FT_JOELL_data_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.csv`;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    // ======================== INISIALISASI ========================
    function init() {
        loadLogoFromLocalStorage();
        if (!loadTeams() || teams.length === 0) {
            resetDefault();
        } else {
            renderTable();
        }
    }
    init();

    document.getElementById('addBtn').onclick = addTeam;
    document.getElementById('resetBtn').onclick = resetDefault;
    document.getElementById('clearBtn').onclick = clearAll;
    document.getElementById('posterBtn').onclick = downloadPoster;
    document.getElementById('csvBtn').onclick = exportCSV;
</script>
</body>
</html>
