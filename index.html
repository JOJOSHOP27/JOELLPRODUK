<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FT RAMOT · SESI 19.00</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(ellipse at 20% 30%, #0a0f2a, #03050b);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            padding: 1rem;
            min-height: 100vh;
            color: #edf2ff;
        }
        .premium-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .hero-section {
            background: rgba(15, 25, 45, 0.55);
            backdrop-filter: blur(8px);
            border-radius: 1.2rem;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(0,255,255,0.2);
        }
        .title-area h1 {
            font-size: 1.3rem;
            font-weight: 800;
            color: white;
            text-shadow: 0 0 4px #7EE7FF;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sub {
            font-size: 0.6rem;
            color: #a0b3d9;
            margin-top: 2px;
        }
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin: 0.8rem 0;
            gap: 6px;
        }
        .btn-premium {
            background: rgba(20,30,55,0.7);
            border: 1px solid rgba(80,160,255,0.4);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
            color: #eef2ff;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-primary { background: linear-gradient(95deg,#0f2b3d,#1b4b6e); border-color: #2dd4bf; }
        .btn-danger { border-color: #f87171; color: #ffe0e0; }
        .btn-success { border-color: #10b981; color: #a7f3d0; }
        .table-wrapper {
            background: rgba(8,14,26,0.65);
            backdrop-filter: blur(8px);
            border-radius: 1rem;
            border: 1px solid rgba(45,212,191,0.3);
            overflow-x: auto;
            margin-bottom: 1rem;
        }
        .luxury-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.65rem;
            min-width: 550px;
        }
        .luxury-table th {
            padding: 0.35rem 0.2rem;
            background: rgba(0,0,0,0.4);
            font-weight: 700;
            font-size: 0.6rem;
            color: #cbd5ff;
            border-bottom: 1px solid #2dd4bf40;
        }
        .luxury-table td {
            padding: 0.3rem 0.15rem;
            text-align: center;
            border-bottom: 1px solid rgba(45,212,191,0.15);
        }
        .luxury-input {
            background: rgba(12,20,35,0.9);
            border: 1px solid #2d3a5e;
            border-radius: 12px;
            padding: 2px 4px;
            width: 100%;
            max-width: 60px;
            text-align: center;
            font-size: 0.6rem;
            color: #f0f3ff;
        }
        .team-input {
            max-width: 100px;
            text-align: left;
            font-weight: 600;
        }
        .total-gold {
            font-weight: 800;
            color: #FFD966;
            font-size: 0.7rem;
        }
        .podium-table-wrapper {
            background: rgba(8,14,26,0.65);
            border-radius: 1rem;
            border: 1px solid rgba(255,215,0,0.4);
            margin-bottom: 1rem;
            overflow-x: auto;
        }
        .podium-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
        }
        .podium-table th {
            background: rgba(0,0,0,0.5);
            padding: 0.4rem;
            color: #FFD966;
            font-size: 0.65rem;
        }
        .podium-table td {
            padding: 0.3rem;
            text-align: center;
        }
        .footer-note {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.55rem;
            color: #6a7c9e;
            border-top: 1px solid #2dd4bf30;
            padding-top: 0.6rem;
            display: flex;
            justify-content: space-between;
        }
        @media (max-width: 700px) {
            .luxury-input { max-width: 50px; }
            .team-input { max-width: 85px; }
        }
    </style>
</head>
<body>
<div class="premium-container" id="posterArea">
    <div class="hero-section">
        <div class="title-area">
            <h1><i class="fas fa-crown"></i> FT RAMOT · SESI 19.00</h1>
            <div class="sub">Edit langsung (Nama, M1, M2, M3, KILL, PLACE) | TOTAL = KILL + PLACE</div>
        </div>
    </div>

    <div class="action-bar" id="actionBar">
        <div>
            <button class="btn-premium btn-primary" id="addTeamBtn"><i class="fas fa-plus"></i> Tambah</button>
            <button class="btn-premium btn-danger" id="clearAllBtn"><i class="fas fa-trash"></i> Hapus Semua</button>
        </div>
        <div>
            <button class="btn-premium btn-success" id="downloadPosterBtn"><i class="fas fa-camera"></i> Poster</button>
            <button class="btn-premium btn-success" id="exportCsvBtn"><i class="fas fa-file-csv"></i> CSV</button>
            <span style="font-size:0.6rem;"><i class="fas fa-save"></i> Auto-save</span>
        </div>
    </div>

    <div class="table-wrapper" id="tableWrapper">
        <table class="luxury-table" id="rankTable">
            <thead><tr><th>#</th><th>TEAM</th><th>M1</th><th>M2</th><th>M3</th><th>KILL</th><th>PLACE</th><th>TOTAL</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="podium-table-wrapper">
        <table class="podium-table">
            <thead><tr><th>JUARA</th><th>NICKNAME</th><th>POINT</th></tr></thead>
            <tbody id="podiumBody"><tr><td>Juara 1</td><td>-</td><td>0</td></tr><tr><td>Juara 2</td><td>-</td><td>0</td></tr><tr><td>Juara 3</td><td>-</td><td>0</td></tr></tbody>
        </table>
    </div>

    <div class="footer-note">
        <span><i class="fas fa-chart-simple"></i> Total = Kill + Place</span>
        <span><i class="fas fa-database"></i> Data tersimpan otomatis</span>
    </div>
</div>

<script>
    // 12 tim bersih semua "NEW TIM" dan 0
    const DEFAULT_DATA = Array(12).fill().map(() => ({ name: "NEW TIM", m1: 0, m2: 0, m3: 0, kill: 0, place: 0 }));
    let teams = [];

    function genId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 6); }
    function persist() { localStorage.setItem('ff_rapat_fix', JSON.stringify(teams.map(t => ({ id: t.id, name: t.name, m1: t.m1, m2: t.m2, m3: t.m3, kill: t.kill, place: t.place })))); }
    function load() {
        let raw = localStorage.getItem('ff_rapat_fix');
        if (raw) {
            try {
                let p = JSON.parse(raw);
                if (Array.isArray(p)) { teams = p.map(t => ({ id: t.id || genId(), name: t.name, m1: t.m1 ?? 0, m2: t.m2 ?? 0, m3: t.m3 ?? 0, kill: t.kill ?? 0, place: t.place ?? 0 })); return true; }
            } catch(e) { console.warn(e); }
        }
        return false;
    }
    function setDefault() {
        teams = DEFAULT_DATA.map((d, i) => ({ id: genId()+'-'+i, name: d.name, m1: d.m1, m2: d.m2, m3: d.m3, kill: d.kill, place: d.place }));
        persist(); renderTable(); updatePodium();
    }
    function getSortedByTotal() { return [...teams].sort((a,b) => (b.kill+b.place) - (a.kill+a.place)); }
    function updatePodium() {
        let sorted = getSortedByTotal();
        let podiumBody = document.getElementById('podiumBody');
        podiumBody.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            let row = podiumBody.insertRow();
            row.insertCell(0).innerText = `Juara ${i+1}`;
            if (sorted[i]) { row.insertCell(1).innerText = sorted[i].name; row.insertCell(2).innerText = sorted[i].kill + sorted[i].place; }
            else { row.insertCell(1).innerText = '-'; row.insertCell(2).innerText = '0'; }
        }
    }
    function renderTable() {
        let tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        if (teams.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:1rem;">Belum ada data</td></tr>'; updatePodium(); return; }
        teams.forEach((team, idx) => {
            let row = tbody.insertRow();
            row.insertCell(0).innerText = idx+1;
            let nameCell = row.insertCell(1);
            let nameInp = document.createElement('input'); nameInp.type='text'; nameInp.value=team.name; nameInp.className='luxury-input team-input';
            nameCell.appendChild(nameInp);
            let m1Cell = row.insertCell(2), m1Inp = document.createElement('input'); m1Inp.type='number'; m1Inp.value=team.m1; m1Inp.className='luxury-input'; m1Cell.appendChild(m1Inp);
            let m2Cell = row.insertCell(3), m2Inp = document.createElement('input'); m2Inp.type='number'; m2Inp.value=team.m2; m2Inp.className='luxury-input'; m2Cell.appendChild(m2Inp);
            let m3Cell = row.insertCell(4), m3Inp = document.createElement('input'); m3Inp.type='number'; m3Inp.value=team.m3; m3Inp.className='luxury-input'; m3Cell.appendChild(m3Inp);
            let killCell = row.insertCell(5), killInp = document.createElement('input'); killInp.type='number'; killInp.value=team.kill; killInp.className='luxury-input'; killCell.appendChild(killInp);
            let placeCell = row.insertCell(6), placeInp = document.createElement('input'); placeInp.type='number'; placeInp.value=team.place; placeInp.className='luxury-input'; placeCell.appendChild(placeInp);
            let totalCell = row.insertCell(7), totalSpan = document.createElement('span'); totalSpan.className='total-gold'; totalSpan.innerText=team.kill+team.place; totalCell.appendChild(totalSpan);
            function update() { let k = parseInt(killInp.value)||0, p = parseInt(placeInp.value)||0; totalSpan.innerText=k+p; persist(); updatePodium(); }
            nameInp.onchange = () => { team.name = nameInp.value.trim()||'Nameless'; persist(); updatePodium(); };
            m1Inp.onchange = () => { team.m1 = parseInt(m1Inp.value)||0; persist(); };
            m2Inp.onchange = () => { team.m2 = parseInt(m2Inp.value)||0; persist(); };
            m3Inp.onchange = () => { team.m3 = parseInt(m3Inp.value)||0; persist(); };
            killInp.onchange = () => { team.kill = parseInt(killInp.value)||0; update(); };
            placeInp.onchange = () => { team.place = parseInt(placeInp.value)||0; update(); };
            killInp.oninput = () => { let k = parseInt(killInp.value)||0, p = parseInt(placeInp.value)||0; totalSpan.innerText = k+p; };
            placeInp.oninput = () => { let k = parseInt(killInp.value)||0, p = parseInt(placeInp.value)||0; totalSpan.innerText = k+p; };
        });
        updatePodium();
    }
    function addTeam() { teams.push({ id: genId(), name: "NEW TIM", m1:0, m2:0, m3:0, kill:0, place:0 }); renderTable(); persist(); }
    function clearAll() { if(confirm('Hapus semua data?')) { teams = []; renderTable(); persist(); } }
    async function downloadPoster() {
        let actionBar = document.getElementById('actionBar');
        let wrapper = document.getElementById('tableWrapper');
        let origBar = actionBar.style.display;
        let origOver = wrapper.style.overflowX;
        let origWidth = wrapper.style.width;
        actionBar.style.display = 'none';
        wrapper.style.overflowX = 'visible';
        wrapper.style.width = 'max-content';
        let btn = document.getElementById('downloadPosterBtn');
        let oldHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i>';
        btn.disabled = true;
        try {
            let canvas = await html2canvas(document.getElementById('posterArea'), { scale: 2.5, backgroundColor: '#03050b', logging: false, useCORS: true, windowWidth: document.getElementById('posterArea').scrollWidth, windowHeight: document.getElementById('posterArea').scrollHeight });
            let link = document.createElement('a');
            link.download = `FT_RAMOT_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        } catch(e) { alert('Gagal membuat poster'); }
        finally {
            actionBar.style.display = origBar;
            wrapper.style.overflowX = origOver;
            wrapper.style.width = origWidth;
            btn.innerHTML = oldHtml;
            btn.disabled = false;
        }
    }
    function exportCSV() {
        if (!teams.length) { alert('Tidak ada data'); return; }
        let rows = [['#','TEAM','M1','M2','M3','KILL','PLACE','TOTAL'].join(',')];
        teams.forEach((t,i) => rows.push([i+1,`"${t.name.replace(/"/g,'""')}"`,t.m1,t.m2,t.m3,t.kill,t.place,t.kill+t.place].join(',')));
        let sorted = getSortedByTotal();
        rows.push(['', '=== PODIUM ===', '', '', '', '', '', '']);
        if(sorted[0]) rows.push(['Juara 1', sorted[0].name, '', '', '', '', '', sorted[0].kill+sorted[0].place]);
        if(sorted[1]) rows.push(['Juara 2', sorted[1].name, '', '', '', '', '', sorted[1].kill+sorted[1].place]);
        if(sorted[2]) rows.push(['Juara 3', sorted[2].name, '', '', '', '', '', sorted[2].kill+sorted[2].place]);
        let blob = new Blob([rows.join('\n')], {type:'text/csv;charset=utf-8;'});
        let a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `FT_RAMOT_data_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.csv`;
        a.click(); URL.revokeObjectURL(a.href);
    }
    function init() { if(!load() || teams.length===0) setDefault(); else { renderTable(); updatePodium(); } }
    document.addEventListener('DOMContentLoaded', () => {
        init();
        document.getElementById('addTeamBtn').onclick = addTeam;
        document.getElementById('clearAllBtn').onclick = clearAll;
        document.getElementById('downloadPosterBtn').onclick = downloadPoster;
        document.getElementById('exportCsvBtn').onclick = exportCSV;
    });
</script>
</body>
</html>
